name: build

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
  workflow_dispatch:

jobs:
  windows-mingw:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}

    steps:
      - name: Checkout (with Codec 2 submodule)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up MSYS2 + MinGW-w64 toolchain
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: false
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja

      - name: Configure (static Release)
        run: |
          cmake -S codec2 -B build -G Ninja \
            -DCMAKE_C_COMPILER=gcc \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=OFF \
            -DCMAKE_EXE_LINKER_FLAGS="-static -static-libgcc"

      - name: Build c2enc / c2dec
        run: cmake --build build --target c2enc c2dec

      - name: Collect binaries
        run: |
          mkdir -p dist
          cp build/src/c2enc.exe dist/
          cp build/src/c2dec.exe dist/
          ldd dist/c2enc.exe || true

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: c2enc-c2dec-windows-x64
          path: dist/*.exe

      - name: Attach to release (on tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.exe
