name: build

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
  workflow_dispatch:

jobs:
  windows-mingw:
    runs-on: windows-latest

    steps:
      - name: Checkout (with Codec 2 submodule)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up MinGW-w64 GCC
        uses: egor-tensin/setup-mingw@v2
        with:
          platform: x64

      - name: Set up Ninja
        uses: seanmiddleditch/gha-setup-ninja@v5

      - name: Configure (static Release)
        run: >
          cmake -S codec2 -B build -G Ninja
          -DCMAKE_C_COMPILER=gcc
          -DCMAKE_BUILD_TYPE=Release
          -DBUILD_SHARED_LIBS=OFF
          -DCMAKE_EXE_LINKER_FLAGS="-static -static-libgcc"

      - name: Build c2enc / c2dec
        run: cmake --build build --target c2enc c2dec

      - name: Collect binaries
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          Copy-Item build/src/c2enc.exe dist/
          Copy-Item build/src/c2dec.exe dist/
          dumpbin /dependents dist/c2enc.exe 2>$null; if (-not $?) { & gcc --version }

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: c2enc-c2dec-windows-x64
          path: dist/*.exe

      - name: Attach to release (on tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.exe
